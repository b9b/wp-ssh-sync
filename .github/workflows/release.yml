name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate
        run: |
          python3 -B -m py_compile tools/build-release.py
          if [ -d scripts ]; then
            find scripts -name '*.sh' -print -exec sh -n {} \;
          fi
          sh -n install.sh

      - name: Build release assets
        run: |
          python3 -B tools/build-release.py
          test -f dist/wp-ssh-sync/SKILL.md
          test -f dist/wp-ssh-sync/agents/openai.yaml
          test -f dist/wp-ssh-sync/.env.example
          test -f dist/wp-ssh-sync.zip
          test -f dist/wp-ssh-sync.tar.gz
          test -f dist/install.sh
          test -f dist/SHA256SUMS
          grep -q '^name: wp-ssh-sync$' dist/wp-ssh-sync/SKILL.md
          grep -q '^description:' dist/wp-ssh-sync/SKILL.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/install.sh \
            dist/wp-ssh-sync.zip \
            dist/wp-ssh-sync.tar.gz \
            dist/SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME for wp-ssh-sync."
